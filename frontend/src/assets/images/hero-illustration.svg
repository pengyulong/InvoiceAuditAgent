<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f8fafc"/>

  <!-- Document illustration -->
  <rect x="50" y="50" width="120" height="160" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="70" y1="80" x2="150" y2="80" stroke="#d1d5db" stroke-width="2"/>
  <line x1="70" y1="100" x2="150" y2="100" stroke="#d1d5db" stroke-width="2"/>
  <line x1="70" y1="120" x2="130" y2="120" stroke="#d1d5db" stroke-width="2"/>
  <line x1="70" y1="140" x2="140" y2="140" stroke="#d1d5db" stroke-width="2"/>
  <circle cx="80" cy="170" r="4" fill="#10b981"/>
  <line x1="90" y1="170" x2="120" y2="170" stroke="#d1d5db" stroke-width="2"/>

  <!-- Invoice illustration -->
  <rect x="230" y="50" width="120" height="160" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="250" y="70" width="80" height="8" fill="#3b82f6"/>
  <line x1="250" y1="90" x2="330" y2="90" stroke="#d1d5db" stroke-width="2"/>
  <line x1="250" y1="105" x2="310" y2="105" stroke="#d1d5db" stroke-width="2"/>
  <line x1="250" y1="120" x2="320" y2="120" stroke="#d1d5db" stroke-width="2"/>
  <rect x="250" y="135" width="60" height="6" fill="#f59e0b"/>
  <line x1="250" y1="150" x2="330" y2="150" stroke="#d1d5db" stroke-width="2"/>
  <line x1="250" y1="165" x2="300" y2="165" stroke="#d1d5db" stroke-width="2"/>
  <line x1="250" y1="180" x2="320" y2="180" stroke="#d1d5db" stroke-width="2"/>

  <!-- Connection arrow -->
  <path d="M 180 130 L 220 130" stroke="#10b981" stroke-width="3" stroke-dasharray="5,5"/>
  <polygon points="220,125 230,130 220,135" fill="#10b981"/>

  <!-- Checkmark -->
  <circle cx="290" cy="240" r="20" fill="#10b981"/>
  <path d="M 280 240 L 287 247 L 300 233" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">智能审计系统</text>
</svg>